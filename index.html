// ScheduleMatchView
// ═══════════════════════════════════════════════════════════════
function ScheduleMatchView({ schedule, currentRoundIdx, viewingRoundIdx, setViewingRoundIdx, confirmedRounds, onConfirmRound, teams, teamNames, teamColorIndices, gks, courtCount, allEvents, onRecordEvent, onUndoEvent, onDeleteEvent, onEditEvent, completedMatches, attendees, styles: s }) {
  const round = schedule[viewingRoundIdx];
  const matches = round?.matches || [];
  const isConfirmed = confirmedRounds[viewingRoundIdx] || false;

  // 각 경기별 matchInfo 생성
  const matchInfos = useMemo(() => {
    return matches.map((pair, i) => ({
      homeIdx: pair[0], awayIdx: pair[1],
      matchId: `R${viewingRoundIdx+1}_C${i}`,
      homeTeam: teamNames[pair[0]], awayTeam: teamNames[pair[1]],
      homeGk: gks[pair[0]] || null, awayGk: gks[pair[1]] || null,
      homeColor: TEAM_COLORS[teamColorIndices[pair[0]]],
      awayColor: TEAM_COLORS[teamColorIndices[pair[1]]],
      homePlayers: teams[pair[0]],
      awayPlayers: teams[pair[1]],
    }));
  }, [viewingRoundIdx, matches, teamNames, gks, teamColorIndices, teams]);

  return (
    <div>
      {/* 라운드 네비게이션 */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:12, marginBottom:10 }}>
        <button onClick={() => setViewingRoundIdx(Math.max(0, viewingRoundIdx - 1))} disabled={viewingRoundIdx === 0}
          style={{ ...s.btnSm(C.grayDark), opacity: viewingRoundIdx===0?0.3:1 }}>◀</button>
        <div style={{ fontSize:14, fontWeight:700, color:C.white }}>
          라운드 {viewingRoundIdx + 1} / {schedule.length}
          <span style={{ fontSize:11, marginLeft:8, color: isConfirmed ? C.green : C.orange, fontWeight:600 }}>
            {isConfirmed ? "종료된게임" : "경기진행중"}
          </span>
        </div>
        <button onClick={() => setViewingRoundIdx(Math.min(currentRoundIdx, viewingRoundIdx + 1))} disabled={viewingRoundIdx >= currentRoundIdx}
          style={{ ...s.btnSm(C.grayDark), opacity: viewingRoundIdx>=currentRoundIdx?0.3:1 }}>▶</button>
      </div>

      {/* 스코어 요약 */}
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        {matchInfos.map((mi, i) => {
          const evts = allEvents.filter(e => e.matchId === mi.matchId);
          const hs = evts.filter(e => e.scoringTeam === mi.homeTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0);
          const as_ = evts.filter(e => e.scoringTeam === mi.awayTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0);
          return (
            <div key={i} style={{ flex:1, background:C.card, borderRadius:10, padding:"8px 6px", textAlign:"center", borderTop:`3px solid ${i===0?C.accent:C.orange}` }}>
              <div style={{ fontSize:10, color:i===0?C.accent:C.orange, fontWeight:700, marginBottom:4 }}>{courtCount===2?(i===0?"A구장":"B구장"):`경기${i+1}`}</div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                <span style={{ fontSize:12, fontWeight:600, color:hs>as_?C.green:C.white }}>{mi.homeTeam}</span>
                <span style={{ fontSize:18, fontWeight:900, color:C.white }}>{hs} : {as_}</span>
                <span style={{ fontSize:12, fontWeight:600, color:as_>hs?C.green:C.white }}>{mi.awayTeam}</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* 구장별 CourtRecorder 나열 */}
      {matchInfos.map((mi, i) => (
        <div key={`${viewingRoundIdx}_${i}`} style={{ marginBottom:16, borderLeft:`3px solid ${i===0?C.accent:C.orange}`, paddingLeft:8 }}>
          <div style={{ fontSize:13, fontWeight:700, color: i===0?C.accent:C.orange, marginBottom:6 }}>
            {courtCount === 2 ? (i === 0 ? "A구장" : "B구장") : `경기 ${i+1}`}
          </div>
          <CourtRecorder
            matchInfo={mi}
            homePlayers={mi.homePlayers}
            awayPlayers={mi.awayPlayers}
            allEvents={allEvents}
            onRecordEvent={onRecordEvent}
            onUndoEvent={onUndoEvent}
            onDeleteEvent={onDeleteEvent}
            onEditEvent={onEditEvent}
            onFinish={() => {}}
            styles={s}
            courtLabel={courtCount === 2 ? (i === 0 ? "A구장" : "B구장") : ""}
            attendees={attendees}
          />
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// FreeMatchView
// ═══════════════════════════════════════════════════════════════
function FreeMatchView({ teams, teamNames, teamColorIndices, gks, courtCount, allEvents, onRecordEvent, onUndoEvent, onDeleteEvent, onEditEvent, onFinishMatch, completedMatches, attendees, styles: s, isExtraRound }) {
  const [courtMatches, setCourtMatches] = useState({}); // { 0: {home,away}, 1: {home,away} }
  const [activeCourtTab, setActiveCourtTab] = useState(0);
  const [settingCourt, setSettingCourt] = useState(null); // which court is being configured
  const [selection, setSelection] = useState({ home: null, away: null });

  const courtCount2 = courtCount === 2;
  const courts = courtCount2 ? [0, 1] : [0];

  // 구장에 대진이 설정되었는지
  const courtHasMatch = (ci) => courtMatches[ci] && courtMatches[ci].home !== null && courtMatches[ci].away !== null;

  // matchInfo 생성
  const getMatchInfo = (ci) => {
    const cm = courtMatches[ci];
    if (!cm || cm.home === null || cm.away === null) return null;
    return {
      homeIdx: cm.home, awayIdx: cm.away,
      matchId: `F${completedMatches.length + ci + 1}_C${ci}`,
      homeTeam: teamNames[cm.home], awayTeam: teamNames[cm.away],
      homeGk: gks[cm.home] || null, awayGk: gks[cm.away] || null,
      homeColor: TEAM_COLORS[teamColorIndices[cm.home]],
      awayColor: TEAM_COLORS[teamColorIndices[cm.away]],
      homePlayers: teams[cm.home],
      awayPlayers: teams[cm.away],
    };
  };

  const activeMatchInfo = getMatchInfo(activeCourtTab);

  const handleSetCourt = () => {
    if (selection.home === null || selection.away === null || selection.home === selection.away) return;
    setCourtMatches(prev => ({ ...prev, [settingCourt]: { home: selection.home, away: selection.away } }));
    setSelection({ home: null, away: null });
    setSettingCourt(null);
  };

  // 라운드 확정 (모든 구장)
  const handleConfirmRound = () => {
    const results = [];
    for (const ci of courts) {
      const mi = getMatchInfo(ci);
      if (!mi) continue;
      const evts = allEvents.filter(e => e.matchId === mi.matchId);
      const homeScore = evts.filter(e => e.scoringTeam === mi.homeTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0);
      const awayScore = evts.filter(e => e.scoringTeam === mi.awayTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0);
      results.push({ ...mi, homeScore, awayScore, court: courtCount2 ? (ci===0?"A구장":"B구장") : "", mercenaries: [] });
    }
    if (results.length === 0) { alert("진행 중인 경기가 없습니다"); return; }
    const msg = results.map(r => `${r.court?r.court+": ":""}${r.homeTeam} ${r.homeScore}:${r.awayScore} ${r.awayTeam}`).join("\n");
    if (!confirm(msg + "\n\n경기결과를 확정하시겠습니까?")) return;
    results.forEach(r => onFinishMatch(r));
    setCourtMatches({});
  };

  // 구장 설정 모달
  if (settingCourt !== null) {
    return (
      <div>
        <div style={{ fontSize:13, color:C.gray, marginBottom:8 }}>{courtCount2 ? (settingCourt===0?"A구장":"B구장") : ""} 대진 선택</div>
        <div style={s.card}>
          <div style={{ display:"flex", gap:12 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, color:C.gray, marginBottom:6, textAlign:"center" }}>홈팀</div>
              {teamNames.map((name, idx) => (
                <button key={idx} onClick={() => setSelection(prev => ({ ...prev, home: idx }))}
                  style={{ ...s.matchBtn(selection.home === idx ? TEAM_COLORS[teamColorIndices[idx]] : null), width:"100%", marginBottom:4, opacity: selection.away === idx ? 0.3 : 1 }}>
                  {name}
                </button>
              ))}
            </div>
            <div style={{ display:"flex", alignItems:"center", color:C.gray, fontSize:18, fontWeight:900 }}>VS</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, color:C.gray, marginBottom:6, textAlign:"center" }}>원정팀</div>
              {teamNames.map((name, idx) => (
                <button key={idx} onClick={() => setSelection(prev => ({ ...prev, away: idx }))}
                  style={{ ...s.matchBtn(selection.away === idx ? TEAM_COLORS[teamColorIndices[idx]] : null), width:"100%", marginBottom:4, opacity: selection.home === idx ? 0.3 : 1 }}>
                  {name}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display:"flex", gap:8, marginTop:12 }}>
            <button onClick={() => { setSettingCourt(null); setSelection({home:null,away:null}); }} style={s.btn(C.grayDark)}>취소</button>
            <button onClick={handleSetCourt}
              disabled={selection.home === null || selection.away === null || selection.home === selection.away}
              style={{ ...s.btnFull(C.green), flex:1, opacity: (selection.home!==null&&selection.away!==null&&selection.home!==selection.away)?1:0.4 }}>
              확인
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* 구장 탭 */}
      {courtCount2 && (
        <div style={s.tabRow}>
          {courts.map(ci => {
            const mi = getMatchInfo(ci);
            return (
              <button key={ci} onClick={() => setActiveCourtTab(ci)}
                style={{ ...s.tab(activeCourtTab === ci), fontSize:11, padding:"8px 4px" }}>
                <div>{ci===0?"A구장":"B구장"}</div>
                {mi && <div style={{ fontSize:10, marginTop:2, opacity:0.8 }}>{mi.homeTeam} vs {mi.awayTeam}</div>}
                {!mi && <div style={{ fontSize:10, marginTop:2, opacity:0.5 }}>미설정</div>}
              </button>
            );
          })}
        </div>
      )}

      {/* 대진 미설정 시 설정 버튼 */}
      {!courtHasMatch(activeCourtTab) ? (
        <div style={{ textAlign:"center", padding:30 }}>
          <div style={{ color:C.gray, marginBottom:12 }}>{courtCount2?(activeCourtTab===0?"A구장":"B구장"):""} 대진을 설정하세요</div>
          <button onClick={() => setSettingCourt(activeCourtTab)} style={s.btn(C.accent, C.bg)}>대진 설정</button>
        </div>
      ) : (
        <div>
          <CourtRecorder
            key={`free_${activeCourtTab}_${courtMatches[activeCourtTab]?.home}_${courtMatches[activeCourtTab]?.away}`}
            matchInfo={activeMatchInfo}
            homePlayers={activeMatchInfo.homePlayers}
            awayPlayers={activeMatchInfo.awayPlayers}
            allEvents={allEvents} onRecordEvent={onRecordEvent} onUndoEvent={onUndoEvent}
            onDeleteEvent={onDeleteEvent} onEditEvent={onEditEvent}
            onFinish={() => {}} styles={s}
            courtLabel={courtCount2 ? (activeCourtTab===0?"A구장":"B구장") : ""}
            attendees={attendees}
          />
        </div>
      )}

      {/* 라운드 확정 버튼 */}
      {courts.some(ci => courtHasMatch(ci)) && (
        <div style={{ marginTop:12 }}>
          <button onClick={handleConfirmRound} style={{ ...s.btnFull(C.accent, C.bg) }}>경기 종료 확정</button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [phase, setPhase] = useState("setup");
  const [dataLoading, setDataLoading] = useState(true);
  const [dataSource, setDataSource] = useState(""); // "sheet" or "fallback"
  const [seasonPlayers, setSeasonPlayers] = useState(FALLBACK_DATA.players);
  const [seasonCrova, setSeasonCrova] = useState(FALLBACK_DATA.seasonCrova);
  const [seasonGoguma, setSeasonGoguma] = useState(FALLBACK_DATA.seasonGoguma);
  const [pendingRestore, setPendingRestore] = useState(null); // 복원 대기 상태
  const [syncStatus, setSyncStatus] = useState(""); // "", "saving", "saved", "error"

  const [attendanceLoading, setAttendanceLoading] = useState(false);

  // 앱 시작 시: 선수 데이터 + 저장된 경기 상태 불러오기
  useEffect(() => {
    Promise.all([
      fetchSheetData().catch(err => { console.warn("시트 로딩 실패:", err.message); return null; }),
      AppSync.loadState(),
    ]).then(([sheetData, saved]) => {
      if (sheetData) {
        SEASON_DATA = sheetData;
        setSeasonPlayers(sheetData.players);
        setSeasonCrova(sheetData.seasonCrova);
        setSeasonGoguma(sheetData.seasonGoguma);
        setDataSource("sheet");
      } else {
        setDataSource("fallback");
      }
      // 저장된 경기 상태가 있으면 복원 여부 확인
      if (saved && saved.found && saved.state && saved.state.phase !== "setup") {
        setPendingRestore(saved);
      }
    }).finally(() => setDataLoading(false));
  }, []);

  // 참석명단 시트 연동 (버튼 클릭 시)
  const syncAttendance = () => {
    setAttendanceLoading(true);
    fetchAttendanceData()
      .then(data => {
        setAttendees(data.attendees);
        if (data.teamCount) setTeamCount(data.teamCount);
      })
      .catch(err => alert("참석명단 연동 실패: " + err.message))
      .finally(() => setAttendanceLoading(false));
  };

  const [attendees, setAttendees] = useState([]);
  const [newPlayer, setNewPlayer] = useState("");
  const [teamCount, setTeamCount] = useState(4);
  const [courtCount, setCourtCount] = useState(2);
  const [matchMode, setMatchMode] = useState("schedule");
  const [rotations, setRotations] = useState(2);

  const [teams, setTeams] = useState([]);
  const [teamNames, setTeamNames] = useState([]);
  const [teamColorIndices, setTeamColorIndices] = useState([]);
  const [gks, setGks] = useState({});
  const [editingTeamName, setEditingTeamName] = useState(null);
  const [moveSource, setMoveSource] = useState(null);

  const [schedule, setSchedule] = useState([]);
  const [currentRoundIdx, setCurrentRoundIdx] = useState(0);
  const [viewingRoundIdx, setViewingRoundIdx] = useState(0);
  const [confirmedRounds, setConfirmedRounds] = useState({});
  const [completedMatches, setCompletedMatches] = useState([]);
  const [allEvents, setAllEvents] = useState([]);
  const [isExtraRound, setIsExtraRound] = useState(false);
  const [splitPhase, setSplitPhase] = useState("first");
  const [matchModal, setMatchModal] = useState(null); // "schedule"|"standings"|"playerStats"

  // 경기 상태를 시트에 자동 저장 (디바운스)
  const saveTimerRef = useRef(null);
  const autoSave = useCallback(() => {
    if (!AppSync.enabled()) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      setSyncStatus("saving");
      AppSync.saveState({
        phase, teams, teamNames, teamColorIndices, gks, allEvents,
        completedMatches, schedule, currentRoundIdx, viewingRoundIdx, confirmedRounds, attendees,
        teamCount, courtCount, matchMode, isExtraRound, splitPhase, rotations,
      }).then(() => {
        setSyncStatus("saved");
        setTimeout(() => setSyncStatus(""), 2000);
      }).catch(() => setSyncStatus("error"));
    }, 1500); // 1.5초 디바운스
  }, [phase, teams, teamNames, teamColorIndices, gks, allEvents, completedMatches, schedule, currentRoundIdx, viewingRoundIdx, confirmedRounds, attendees, teamCount, courtCount, matchMode, isExtraRound, splitPhase, rotations]);

  // 경기 중 상태 변경 시 자동 저장
  useEffect(() => {
    if (phase !== "setup" && phase !== "") autoSave();
  }, [allEvents, completedMatches, currentRoundIdx, phase, gks]);

  // 저장된 상태 복원
  const restoreState = (saved) => {
    const s = saved.state;
    if (s.attendees) setAttendees(s.attendees);
    if (s.teamCount) setTeamCount(s.teamCount);
    if (s.courtCount) setCourtCount(s.courtCount);
    if (s.matchMode) setMatchMode(s.matchMode);
    if (s.rotations) setRotations(s.rotations);
    if (s.teams) setTeams(s.teams);
    if (s.teamNames) setTeamNames(s.teamNames);
    if (s.teamColorIndices) setTeamColorIndices(s.teamColorIndices);
    if (s.gks) setGks(s.gks);
    if (s.schedule) setSchedule(s.schedule);
    if (s.currentRoundIdx != null) setCurrentRoundIdx(s.currentRoundIdx);
    if (s.completedMatches) setCompletedMatches(s.completedMatches);
    if (s.allEvents) setAllEvents(s.allEvents);
    if (s.isExtraRound != null) setIsExtraRound(s.isExtraRound);
    if (s.splitPhase) setSplitPhase(s.splitPhase);
    if (s.viewingRoundIdx != null) setViewingRoundIdx(s.viewingRoundIdx);
    if (s.confirmedRounds) setConfirmedRounds(s.confirmedRounds);
    if (s.phase) setPhase(s.phase);
    setPendingRestore(null);
  };

  const sortedPlayers = useMemo(() => [...seasonPlayers].sort((a,b) => b.point - a.point), [seasonPlayers]);

  const toggleAttendee = (name) => setAttendees(prev => prev.includes(name) ? prev.filter(x => x !== name) : [...prev, name]);
  const selectAll = () => setAttendees(sortedPlayers.filter(p => p.games > 0).map(p => p.name));
  const clearAll = () => setAttendees([]);

  const addNewPlayer = () => {
    const name = newPlayer.trim();
    if (!name) return;
    if (!attendees.includes(name)) setAttendees(prev => [...prev, name]);
    setNewPlayer("");
  };

  const goToTeamBuild = () => {
    if (attendees.length < teamCount * 2) { alert(`최소 ${teamCount * 2}명 선택`); return; }
    const drafted = snakeDraft(attendees, teamCount);
    setTeams(drafted);
    setTeamNames(drafted.map(t => `팀${t[0]}`));
    setTeamColorIndices(Array.from({ length: teamCount }, (_, i) => i % TEAM_COLORS.length));
    setGks({});
    setPhase("teamBuild");
  };

  const movePlayer = (player, fromIdx, toIdx) => {
    setTeams(prev => { const c = prev.map(t => [...t]); c[fromIdx] = c[fromIdx].filter(p => p !== player); c[toIdx] = [...c[toIdx], player]; return c; });
    if (gks[fromIdx] === player) setGks(prev => { const c = {...prev}; delete c[fromIdx]; return c; });
  };
  const reshuffleTeams = () => { const d = snakeDraft(attendees, teamCount); setTeams(d); setTeamNames(d.map(t => `팀${t[0]}`)); setGks({}); };

  const startMatches = () => {
    if (teams.some(t => t.length < 1)) { alert("모든 팀에 최소 1명"); return; }
    if (matchMode === "schedule") {
      let sched;
      if (courtCount === 2) {
        if (teamCount === 4) sched = generate4Team2Court();
        else if (teamCount === 5) sched = generate5Team2Court();
        else if (teamCount === 6) { sched = generate6Team2Court().firstHalf; setSplitPhase("first"); }
      } else sched = generate1Court(teamCount, rotations);
      setSchedule(sched || []);
      setCurrentRoundIdx(0);
    }
    setCompletedMatches([]);
    setAllEvents([]);
    setIsExtraRound(false);
    setViewingRoundIdx(0);
    setConfirmedRounds({});
    setMatchModal(null);
    setPhase("match");
  };

  const getTeamStandings = useCallback(() => {
    const stats = {};
    teamNames.forEach((t, i) => { stats[t] = { idx:i, games:0, wins:0, draws:0, losses:0, gf:0, ga:0, points:0 }; });
    completedMatches.forEach(m => {
      if (m.isExtra || !stats[m.homeTeam] || !stats[m.awayTeam]) return;
      stats[m.homeTeam].games++; stats[m.awayTeam].games++;
      stats[m.homeTeam].gf += m.homeScore; stats[m.homeTeam].ga += m.awayScore;
      stats[m.awayTeam].gf += m.awayScore; stats[m.awayTeam].ga += m.homeScore;
      if (m.homeScore > m.awayScore) { stats[m.homeTeam].wins++; stats[m.homeTeam].points += 3; stats[m.awayTeam].losses++; }
      else if (m.awayScore > m.homeScore) { stats[m.awayTeam].wins++; stats[m.awayTeam].points += 3; stats[m.homeTeam].losses++; }
      else { stats[m.homeTeam].draws++; stats[m.awayTeam].draws++; stats[m.homeTeam].points++; stats[m.awayTeam].points++; }
    });
    return Object.entries(stats).map(([name, s]) => ({ name, ...s })).sort((a,b) => (b.points-a.points) || ((b.gf-b.ga)-(a.gf-a.ga)) || (b.gf-a.gf));
  }, [completedMatches, teamNames]);

  const currentScheduleRound = useMemo(() => matchMode === "free" || !schedule[currentRoundIdx] ? null : schedule[currentRoundIdx], [schedule, currentRoundIdx, matchMode]);

  const recordMatchEvent = (courtId, event) => setAllEvents(prev => [...prev, { ...event, courtId, timestamp: Date.now() }]);
  const undoMatchEvent = (courtId, matchId) => {
    setAllEvents(prev => {
      const idx = [];
      prev.forEach((e, i) => { if (e.matchId === matchId && e.courtId === courtId) idx.push(i); });
      if (idx.length === 0) return prev;
      return prev.filter((_, i) => i !== idx[idx.length - 1]);
    });
  };
  const deleteEvent = (globalIdx) => {
    setAllEvents(prev => prev.filter((_, i) => i !== globalIdx));
  };
  const editEvent = (globalIdx, updatedEvent) => {
    setAllEvents(prev => prev.map((e, i) => i === globalIdx ? { ...updatedEvent, courtId: e.courtId, timestamp: e.timestamp } : e));
  };

  const finishMatch = (matchData) => {
    const match = { ...matchData, isExtra: isExtraRound };
    setCompletedMatches(prev => [...prev, match]);
  };

  const confirmRound = (roundIdx, matchResults) => {
    matchResults.forEach(r => finishMatch(r));
    setConfirmedRounds(prev => ({ ...prev, [roundIdx]: true }));
    if (matchMode === "schedule" && !isExtraRound) {
      if (teamCount === 6 && courtCount === 2 && splitPhase === "first") {
        const cnt = completedMatches.filter(m => !m.isExtra).length + matchResults.length;
        if (cnt >= 6) {
          const standings = getTeamStandings();
          const top = standings.slice(0,3).map(s => s.idx);
          const bot = standings.slice(3,6).map(s => s.idx);
          const rrT = generateRoundRobin(top), rrB = generateRoundRobin(bot);
          const sh = [];
          for (let r=0;r<2;r++) for (let i=0;i<rrT.length;i++) sh.push({ matches:[...(rrT[i]||[]),...(rrB[i]||[])] });
          setSchedule(prev => [...prev, ...sh]);
          setSplitPhase("second");
        }
      }
      const nextIdx = roundIdx + 1;
      setCurrentRoundIdx(nextIdx);
      setViewingRoundIdx(nextIdx);
    }
  };

  const getPlayerTeamName = useCallback((player) => {
    for (let i=0; i<teams.length; i++) { if (teams[i].includes(player)) return teamNames[i]; }
    return null;
  }, [teams, teamNames]);

  const playerMatchStats = useMemo(() => {
    const stats = {};
    attendees.forEach(p => { stats[p] = { goals:0, assists:0, owngoals:0, conceded:0, keeperGames:0, cleanSheets:0 }; });
    allEvents.forEach(e => {
      if (e.type === "goal") { if (stats[e.player]) stats[e.player].goals++; if (e.assist && stats[e.assist]) stats[e.assist].assists++; if (e.concedingGk && stats[e.concedingGk]) stats[e.concedingGk].conceded++; }
      if (e.type === "owngoal") { if (stats[e.player]) stats[e.player].owngoals++; if (e.concedingGk && stats[e.concedingGk]) stats[e.concedingGk].conceded += 2; }
    });
    completedMatches.forEach(m => {
      if (m.homeGk && stats[m.homeGk]) { stats[m.homeGk].keeperGames++; if (m.awayScore === 0) stats[m.homeGk].cleanSheets++; }
      if (m.awayGk && stats[m.awayGk]) { stats[m.awayGk].keeperGames++; if (m.homeScore === 0) stats[m.awayGk].cleanSheets++; }
    });
    return stats;
  }, [allEvents, completedMatches, attendees]);

  const finalStandings = useMemo(() => getTeamStandings(), [getTeamStandings]);

  const getSeasonLeader = useCallback((type) => {
    const data = type === "crova" ? seasonCrova : seasonGoguma;
    const entries = Object.entries(data).filter(([,v]) => v !== 0);
    if (entries.length === 0) return null;
    const sorted = entries.sort(([,a],[,b]) => b - a);
    if (sorted.length >= 2 && sorted[0][1] === sorted[1][1]) return null;
    return sorted[0][0];
  }, [seasonCrova, seasonGoguma]);

  const calcPlayerPoints = useCallback((player) => {
    const st = playerMatchStats[player];
    if (!st) return { total:0, goals:0, assists:0, owngoals:0, cleanSheets:0, crova:0, goguma:0, conceded:0, keeperGames:0 };
    let pts = st.goals + st.assists + st.owngoals * -2 + st.cleanSheets;
    let crova=0, goguma=0;
    if (finalStandings.length > 0 && completedMatches.filter(m => !m.isExtra).length > 0) {
      const pt = getPlayerTeamName(player);
      const first = finalStandings[0], last = finalStandings[finalStandings.length-1];
      const sgl = getSeasonLeader("goguma"), scl = getSeasonLeader("crova");
      let cm=1, gm=1;
      if (sgl && getPlayerTeamName(sgl) === first.name) cm = 2;
      if (scl && getPlayerTeamName(scl) === last.name) gm = 2;
      if (pt === first.name) { crova = 2*cm; pts += crova; }
      if (pt === last.name) { goguma = -1*gm; pts += goguma; }
    }
    return { total:pts, goals:st.goals, assists:st.assists, owngoals:st.owngoals, cleanSheets:st.cleanSheets, crova, goguma, conceded:st.conceded, keeperGames:st.keeperGames };
  }, [playerMatchStats, finalStandings, completedMatches, getPlayerTeamName, getSeasonLeader]);

  // ─── STYLES ───
  const styles = {
    app: { background:C.bg, minHeight:"100vh", color:C.white, fontFamily:"'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif", maxWidth:500, margin:"0 auto", paddingBottom:80 },
    header: { background:"linear-gradient(135deg, #0891b2, #6366f1)", padding:"16px", textAlign:"center", position:"sticky", top:0, zIndex:100 },
    title: { fontSize:20, fontWeight:800, color:C.white },
    subtitle: { fontSize:12, color:"rgba(255,255,255,0.7)", marginTop:2 },
    section: { padding:16 },
    sectionTitle: { fontSize:15, fontWeight:700, marginBottom:10, color:C.accent, display:"flex", alignItems:"center", gap:6 },
    card: { background:C.card, borderRadius:12, padding:14, marginBottom:10 },
    btn: (bg, tc="#fff") => ({ background:bg, color:tc, border:"none", borderRadius:8, padding:"10px 16px", fontSize:14, fontWeight:600, cursor:"pointer" }),
    btnFull: (bg, tc="#fff") => ({ background:bg, color:tc, border:"none", borderRadius:8, padding:"10px 16px", fontSize:14, fontWeight:600, cursor:"pointer", width:"100%", display:"block" }),
    btnSm: (bg, tc="#fff") => ({ background:bg, color:tc, border:"none", borderRadius:6, padding:"6px 12px", fontSize:12, fontWeight:600, cursor:"pointer" }),
    chip: (active) => ({ display:"inline-flex", alignItems:"center", gap:4, padding:"8px 14px", borderRadius:20, fontSize:13, fontWeight:600, margin:3, cursor:"pointer", background:active?C.accent:C.cardLight, color:active?C.bg:C.gray, border:`2px solid ${active?C.accent:"transparent"}`, transition:"all 0.15s" }),
    row: { display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" },
    input: { background:C.cardLight, border:`1px solid ${C.grayDark}`, borderRadius:8, padding:"8px 12px", color:C.white, fontSize:14, outline:"none", width:"100%" },
    scoreboard: { display:"flex", alignItems:"center", justifyContent:"center", gap:16, padding:"12px 0", fontSize:36, fontWeight:900, color:C.white },
    th: { padding:"8px 4px", textAlign:"center", color:C.gray, borderBottom:`1px solid ${C.grayDarker}`, fontWeight:600, fontSize:11 },
    td: (hl=false) => ({ padding:"8px 4px", textAlign:"center", borderBottom:`1px solid ${C.grayDarker}`, fontWeight:hl?700:400, color:hl?C.accent:C.white, fontSize:12 }),
    tabRow: { display:"flex", gap:0, marginBottom:12 },
    tab: (active) => ({ flex:1, padding:"10px", textAlign:"center", background:active?C.accent:C.card, color:active?C.bg:C.gray, fontWeight:700, fontSize:14, border:"none", cursor:"pointer", borderRadius:0 }),
    bottomBar: { position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:500, background:C.card, borderTop:`1px solid ${C.grayDarker}`, padding:"10px 16px", display:"flex", gap:8, zIndex:100 },
    phaseIndicator: { display:"flex", justifyContent:"center", gap:8, padding:"8px 0", background:"rgba(0,0,0,0.2)" },
    dot: (active) => ({ width:8, height:8, borderRadius:"50%", background:active?C.accent:C.grayDark }),
    eventLog: { display:"flex", alignItems:"center", padding:"6px 10px", borderRadius:8, background:C.cardLight, marginBottom:4, fontSize:12, gap:6, color:C.white },
    teamCard: (ci) => ({ background:C.card, borderRadius:12, padding:12, marginBottom:10, borderLeft:`4px solid ${TEAM_COLORS[ci]?.bg||C.accent}` }),
    playerInTeam: (color) => ({ display:"inline-flex", alignItems:"center", padding:"6px 10px", borderRadius:8, fontSize:12, fontWeight:600, margin:2, background:`${color?.bg||C.cardLight}22`, color:color?.text==="#fff"?C.white:color?.text||C.white, border:`1px solid ${color?.bg||C.grayDark}44` }),
    matchBtn: (color) => ({ display:"inline-flex", alignItems:"center", justifyContent:"center", padding:"12px 16px", borderRadius:10, fontSize:14, fontWeight:700, margin:3, cursor:"pointer", background:color?.bg||C.cardLight, color:color?.text||C.white, minWidth:60, border:"none" }),
  };

  // ═══════════ LOADING ═══════════
  if (dataLoading) {
    return (
      <div style={{ ...styles.app, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh" }}>
        <div style={{ fontSize:32, marginBottom:16 }}>⚽</div>
        <div style={{ color:C.white, fontSize:16, fontWeight:600, marginBottom:8 }}>마스터FC 경기기록</div>
        <div style={{ color:C.gray, fontSize:13 }}>선수 데이터 불러오는 중...</div>
      </div>
    );
  }

  // ═══════════ 이전 경기 복원 확인 ═══════════
  if (pendingRestore) {
    const s = pendingRestore;
    const savedTime = s.savedAt ? new Date(s.savedAt).toLocaleString("ko-KR") : "알 수 없음";
    return (
      <div style={{ ...styles.app, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:24 }}>
        <div style={{ fontSize:32, marginBottom:16 }}>💾</div>
        <div style={{ color:C.white, fontSize:16, fontWeight:700, marginBottom:8 }}>진행 중인 경기가 있습니다</div>
        <div style={{ color:C.gray, fontSize:13, marginBottom:4 }}>저장 시간: {savedTime}</div>
        <div style={{ color:C.gray, fontSize:12, marginBottom:24 }}>{s.summary || ""}</div>
        <div style={{ display:"flex", gap:12 }}>
          <button onClick={() => restoreState(s)} style={{ padding:"12px 24px", borderRadius:10, border:"none", background:C.green, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer" }}>
            이어서 하기
          </button>
          <button onClick={() => { setPendingRestore(null); AppSync.clearState(); }} style={{ padding:"12px 24px", borderRadius:10, border:"none", background:C.grayDark, color:C.gray, fontSize:14, fontWeight:600, cursor:"pointer" }}>
            새로 시작
          </button>
        </div>
      </div>
    );
  }

  // ═══════════ PHASE: SETUP ═══════════
  if (phase === "setup") {
    return (
      <div style={styles.app}>
        <div style={styles.header}>
          <div style={styles.title}>⚽ 마스터FC 경기기록</div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <div style={styles.subtitle}>{new Date().toLocaleDateString("ko-KR")} 풋살 기록기</div>
            <div style={{ fontSize:9, padding:"2px 6px", borderRadius:4, background: dataSource==="sheet" ? "#22c55e22" : "#f9731644", color: dataSource==="sheet" ? "#22c55e" : "#f97316", fontWeight:600 }}>
              {dataSource==="sheet" ? "시트 연동" : "오프라인"}
            </div>
          </div>
        </div>
        <div style={styles.phaseIndicator}>
          {["참석자","팀편성","경기","집계"].map((l,i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <div style={styles.dot(i===0)}/><span style={{ fontSize:10, color:i===0?C.accent:C.grayDark }}>{l}</span>
            </div>
          ))}
        </div>
        <div style={styles.section}>
          <div style={styles.sectionTitle}>⚙️ 경기 설정</div>
          <div style={styles.card}>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:12, color:C.gray, marginBottom:6 }}>팀 수</div>
              <div style={styles.row}>{[4,5,6].map(n => <button key={n} onClick={() => setTeamCount(n)} style={styles.btn(teamCount===n?C.accent:C.grayDark, teamCount===n?C.bg:C.white)}>{n}팀</button>)}</div>
            </div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:12, color:C.gray, marginBottom:6 }}>구장 수</div>
              <div style={styles.row}>{[1,2].map(n => <button key={n} onClick={() => setCourtCount(n)} style={styles.btn(courtCount===n?C.accent:C.grayDark, courtCount===n?C.bg:C.white)}>{n}코트</button>)}</div>
            </div>
            <div style={{ marginBottom: courtCount===1&&matchMode==="schedule"?12:0 }}>
              <div style={{ fontSize:12, color:C.gray, marginBottom:6 }}>경기 모드</div>
              <div style={styles.row}>
                <button onClick={() => setMatchMode("schedule")} style={styles.btn(matchMode==="schedule"?C.accent:C.grayDark, matchMode==="schedule"?C.bg:C.white)}>대진표</button>
                <button onClick={() => setMatchMode("free")} style={styles.btn(matchMode==="free"?C.accent:C.grayDark, matchMode==="free"?C.bg:C.white)}>자유대진</button>
              </div>
            </div>
            {courtCount===1 && matchMode==="schedule" && (
              <div>
                <div style={{ fontSize:12, color:C.gray, marginBottom:6 }}>회전 수</div>
                <div style={styles.row}>{[1,2,3,4].map(n => <button key={n} onClick={() => setRotations(n)} style={styles.btn(rotations===n?C.accent:C.grayDark, rotations===n?C.bg:C.white)}>{n}회전</button>)}</div>
              </div>
            )}
            {matchMode==="schedule" && courtCount===2 && (
              <div style={{ fontSize:11, color:C.gray, marginTop:8, background:C.cardLight, padding:8, borderRadius:8 }}>
                {teamCount===4&&"4×라운드로빈 · 12라운드"}{teamCount===5&&"더블 라운드로빈 · 10라운드"}{teamCount===6&&"그룹 스플릿 · 12라운드"}
              </div>
            )}
          </div>
        </div>
        <div style={styles.section}>
          <div style={styles.sectionTitle}>👥 참석자 선택 <span style={{ fontSize:12, fontWeight:400, color:C.gray }}>({attendees.length}명)</span></div>
          <div style={{ ...styles.row, marginBottom:10, flexWrap:"wrap" }}>
            <button onClick={syncAttendance} disabled={attendanceLoading} style={{ ...styles.btnSm("#22c55e"), opacity: attendanceLoading ? 0.6 : 1 }}>
              {attendanceLoading ? "연동 중..." : "📋 시트 연동"}
            </button>
            <button onClick={selectAll} style={styles.btnSm(C.grayDark)}>활동선수 전체</button>
            <button onClick={clearAll} style={styles.btnSm(C.grayDark)}>초기화</button>
          </div>
          <div style={styles.card}>
            <div style={{ display:"flex", flexWrap:"wrap" }}>
              {sortedPlayers.map(p => (
                <div key={p.name} onClick={() => toggleAttendee(p.name)} style={styles.chip(attendees.includes(p.name))}>
                  <span>{p.name}</span><span style={{ fontSize:10, opacity:0.7 }}>{p.point}p</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ display:"flex", gap:8, marginTop:8 }}>
            <input style={styles.input} placeholder="새 선수 이름" value={newPlayer} onChange={e => setNewPlayer(e.target.value)} onKeyDown={e => e.key==="Enter"&&addNewPlayer()} />
            <button onClick={addNewPlayer} style={styles.btn(C.green)}>추가</button>
          </div>
        </div>
        <div style={styles.bottomBar}>
          <button onClick={goToTeamBuild} style={{ ...styles.btnFull(C.accent, C.bg), opacity:attendees.length<teamCount*2?0.5:1 }}>
            팀 편성 ({attendees.length}명 → {teamCount}팀)
          </button>
        </div>
      </div>
    );
  }

  // ═══════════ PHASE: TEAM BUILD ═══════════
  if (phase === "teamBuild") {
    return (
      <div style={styles.app}>
        <div style={styles.header}>
          <div style={styles.title}>⚽ 팀 편성</div>
          <div style={styles.subtitle}>스네이크 드래프트 · {teamCount}팀 · {attendees.length}명</div>
        </div>
        <div style={styles.phaseIndicator}>
          {["참석자","팀편성","경기","집계"].map((l,i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <div style={styles.dot(i===1)}/><span style={{ fontSize:10, color:i===1?C.accent:C.grayDark }}>{l}</span>
            </div>
          ))}
        </div>
        <div style={styles.section}>
          <div style={{ ...styles.row, marginBottom:12 }}>
            <button onClick={reshuffleTeams} style={styles.btnSm(C.grayDark)}>재배치</button>
            <span style={{ fontSize:11, color:C.gray }}>전력: {teams.map(t => teamPower(t)).join(" / ")}</span>
          </div>
          {teams.map((team, tIdx) => {
            const color = TEAM_COLORS[teamColorIndices[tIdx]];
            return (
              <div key={tIdx} style={styles.teamCard(teamColorIndices[tIdx])}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    {editingTeamName===tIdx ? (
                      <input autoFocus style={{ ...styles.input, width:100, padding:"4px 8px", fontSize:14, fontWeight:700 }} value={teamNames[tIdx]}
                        onChange={e => { const c=[...teamNames]; c[tIdx]=e.target.value; setTeamNames(c); }}
                        onBlur={() => setEditingTeamName(null)} onKeyDown={e => e.key==="Enter"&&setEditingTeamName(null)} />
                    ) : (
                      <span style={{ fontWeight:700, fontSize:14, cursor:"pointer" }} onClick={() => setEditingTeamName(tIdx)}>{teamNames[tIdx]}</span>
                    )}
                    <span style={{ fontSize:11, color:C.gray }}>전력 {teamPower(team)}</span>
                  </div>
                  <div style={{ display:"flex", gap:3 }}>
                    {TEAM_COLORS.map((tc,ci) => (
                      <div key={ci} onClick={() => { const c=[...teamColorIndices]; c[tIdx]=ci; setTeamColorIndices(c); }}
                        style={{ width:16, height:16, borderRadius:"50%", background:tc.bg, border:teamColorIndices[tIdx]===ci?`2px solid ${C.white}`:`1px solid ${C.grayDark}`, cursor:"pointer" }} />
                    ))}
                  </div>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                  {team.map((player, pIdx) => {
                    const pd = getPlayerData(player);
                    return (
                      <div key={player} style={{ ...styles.playerInTeam(color), color:C.white }}>
                        {pIdx===0 && <span style={{ fontSize:10, marginRight:2 }}>👑</span>}
                        <span>{player}</span>
                        <span style={{ fontSize:10, opacity:0.6, marginLeft:4 }}>{pd.point}p</span>
                        <button onClick={e => { e.stopPropagation(); setMoveSource(moveSource?.player===player?null:{player,teamIdx:tIdx}); }}
                          style={{ ...styles.btnSm(moveSource?.player===player?C.orange:C.grayDarker, C.gray), padding:"2px 6px", fontSize:10, marginLeft:4 }}>
                          {moveSource?.player===player?"취소":"↔"}
                        </button>
                      </div>
                    );
                  })}
                  {moveSource && moveSource.teamIdx!==tIdx && (
                    <div onClick={() => { movePlayer(moveSource.player, moveSource.teamIdx, tIdx); setMoveSource(null); }}
                      style={{ display:"inline-flex", alignItems:"center", padding:"6px 12px", borderRadius:8, fontSize:12, margin:2, cursor:"pointer", border:`2px dashed ${C.accent}`, color:C.accent }}>
                      + {moveSource.player}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div style={styles.bottomBar}>
          <button onClick={() => setPhase("setup")} style={styles.btn(C.grayDark)}>이전</button>
          <button onClick={startMatches} style={{ ...styles.btn(C.green), flex:1 }}>경기 시작</button>
        </div>
      </div>
    );
  }

  // ═══════════ PHASE: MATCH ═══════════
  if (phase === "match") {
    const allRoundsComplete = matchMode==="schedule" && schedule.length > 0 && currentRoundIdx >= schedule.length;
    const viewRound = matchMode==="schedule" ? schedule[viewingRoundIdx] : null;
    const viewRoundConfirmed = confirmedRounds[viewingRoundIdx] || false;

    // 스케줄 모드: 현재 보고 있는 라운드의 경기 결과 계산
    const getScheduleRoundResults = () => {
      if (!viewRound) return [];
      return viewRound.matches.map((pair, i) => {
        const matchId = `R${viewingRoundIdx+1}_C${i}`;
        const evts = allEvents.filter(e => e.matchId === matchId);
        const homeTeam = teamNames[pair[0]], awayTeam = teamNames[pair[1]];
        return {
          homeIdx: pair[0], awayIdx: pair[1], matchId,
          homeTeam, awayTeam,
          homeGk: gks[pair[0]] || null, awayGk: gks[pair[1]] || null,
          homeScore: evts.filter(e => e.scoringTeam === homeTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0),
          awayScore: evts.filter(e => e.scoringTeam === awayTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0),
          court: courtCount===2 ? (i===0?"A구장":"B구장") : "",
          mercenaries: [],
        };
      });
    };

    const handleConfirmScheduleRound = () => {
      const results = getScheduleRoundResults();
      // GK 체크
      for (const r of results) {
        if (!r.homeGk || !r.awayGk) {
          alert(`${r.court} 키퍼를 지정하세요: ${!r.homeGk?r.homeTeam:""}${!r.homeGk&&!r.awayGk?", ":""}${!r.awayGk?r.awayTeam:""}`);
          return;
        }
      }
      const msg = results.map(r => `${r.court?r.court+": ":""}${r.homeTeam} ${r.homeScore}:${r.awayScore} ${r.awayTeam}`).join("\n");
      if (!confirm(msg + "\n\n라운드 " + (viewingRoundIdx+1) + " 결과를 확정하시겠습니까?")) return;
      confirmRound(viewingRoundIdx, results);
    };

    return (
      <div style={styles.app}>
        <div style={styles.header}>
          <div style={styles.title}>⚽ 경기 진행</div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <div style={styles.subtitle}>{matchMode==="schedule"?`${allRoundsComplete?"전체 라운드 완료":`라운드 ${currentRoundIdx+1}/${schedule.length}`}`:`자유대전 · ${completedMatches.length}경기`}</div>
            {AppSync.enabled() && syncStatus && (
              <div style={{ fontSize:9, padding:"2px 6px", borderRadius:4, background: syncStatus==="saved"?"#22c55e22":syncStatus==="saving"?"#3b82f622":"#ef444422", color: syncStatus==="saved"?"#22c55e":syncStatus==="saving"?"#3b82f6":"#ef4444", fontWeight:600 }}>
                {syncStatus==="saving"?"저장 중...":syncStatus==="saved"?"저장됨":"저장 실패"}
              </div>
            )}
          </div>
          {/* 상단 모달 버튼 + 게임마감 */}
          <div style={{ display:"flex", gap:6, justifyContent:"center", marginTop:8 }}>
            {matchMode==="schedule" && <button onClick={() => setMatchModal("schedule")} style={{ ...styles.btnSm(C.grayDark, C.white), fontSize:11 }}>대진표</button>}
            <button onClick={() => setMatchModal("standings")} style={{ ...styles.btnSm(C.grayDark, C.white), fontSize:11 }}>팀순위</button>
            <button onClick={() => setMatchModal("playerStats")} style={{ ...styles.btnSm(C.grayDark, C.white), fontSize:11 }}>개인기록</button>
            {(allRoundsComplete || matchMode==="free") && (
              <button onClick={() => setPhase("summary")} style={{ ...styles.btnSm(C.green, C.bg), fontSize:11, fontWeight:700 }}>게임마감</button>
            )}
          </div>
        </div>

        {/* ── 모달: 대진표 ── */}
        {matchModal === "schedule" && (
          <div onClick={() => setMatchModal(null)} style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.7)", zIndex:1000, overflow:"auto", display:"flex", alignItems:"flex-start", justifyContent:"center", paddingTop:40 }}>
            <div onClick={e => e.stopPropagation()} style={{ background:C.card, borderRadius:14, padding:16, width:"90%", maxWidth:460, maxHeight:"80vh", overflow:"auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
                <span style={{ fontSize:15, fontWeight:700, color:C.white }}>대진표</span>
                <button onClick={() => setMatchModal(null)} style={styles.btnSm(C.grayDark)}>닫기</button>
              </div>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead>
                  <tr>
                    <th style={styles.th}>라운드</th>
                    {courtCount===2 ? (
                      <>{<th style={styles.th}>A구장</th>}{<th style={styles.th}>B구장</th>}</>
                    ) : (
                      <th style={styles.th}>대진</th>
                    )}
                    <th style={styles.th}>상태</th>
                  </tr>
                </thead>
                <tbody>
                  {schedule.map((round, ri) => (
                    <tr key={ri} style={{ background: ri===currentRoundIdx?`${C.accent}11`:"transparent", cursor:"pointer" }}
                      onClick={() => { setViewingRoundIdx(ri <= currentRoundIdx ? ri : viewingRoundIdx); setMatchModal(null); }}>
                      <td style={styles.td(ri===currentRoundIdx)}>{ri+1}</td>
                      {courtCount===2 ? (
                        <>
                          <td style={{ ...styles.td(), fontSize:11 }}>{round.matches[0]?`${teamNames[round.matches[0][0]]} vs ${teamNames[round.matches[0][1]]}`:"-"}</td>
                          <td style={{ ...styles.td(), fontSize:11 }}>{round.matches[1]?`${teamNames[round.matches[1][0]]} vs ${teamNames[round.matches[1][1]]}`:"-"}</td>
                        </>
                      ) : (
                        <td style={{ ...styles.td(), fontSize:11 }}>{round.matches.map((p,mi) => `${teamNames[p[0]]} vs ${teamNames[p[1]]}`).join(", ")}</td>
                      )}
                      <td style={{ ...styles.td(), color: confirmedRounds[ri]?C.green:ri<=currentRoundIdx?C.orange:C.gray, fontSize:10 }}>
                        {confirmedRounds[ri]?"종료":ri<=currentRoundIdx?"진행중":"-"}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── 모달: 팀순위 ── */}
        {matchModal === "standings" && (
          <div onClick={() => setMatchModal(null)} style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.7)", zIndex:1000, overflow:"auto", display:"flex", alignItems:"flex-start", justifyContent:"center", paddingTop:40 }}>
            <div onClick={e => e.stopPropagation()} style={{ background:C.card, borderRadius:14, padding:16, width:"90%", maxWidth:460, maxHeight:"80vh", overflow:"auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
                <span style={{ fontSize:15, fontWeight:700, color:C.white }}>팀 순위</span>
                <button onClick={() => setMatchModal(null)} style={styles.btnSm(C.grayDark)}>닫기</button>
              </div>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead><tr>{["#","팀","경기","승","무","패","득","실","승점"].map(h => <th key={h} style={styles.th}>{h}</th>)}</tr></thead>
                <tbody>
                  {getTeamStandings().map((t,i) => (
                    <tr key={t.name}>
                      <td style={styles.td()}>{i+1}</td><td style={styles.td(true)}>{t.name}</td>
                      <td style={styles.td()}>{t.games}</td><td style={styles.td()}>{t.wins}</td><td style={styles.td()}>{t.draws}</td><td style={styles.td()}>{t.losses}</td>
                      <td style={styles.td()}>{t.gf}</td><td style={styles.td()}>{t.ga}</td><td style={styles.td(true)}>{t.points}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── 모달: 개인기록 ── */}
        {matchModal === "playerStats" && (
          <div onClick={() => setMatchModal(null)} style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.7)", zIndex:1000, overflow:"auto", display:"flex", alignItems:"flex-start", justifyContent:"center", paddingTop:40 }}>
            <div onClick={e => e.stopPropagation()} style={{ background:C.card, borderRadius:14, padding:16, width:"90%", maxWidth:460, maxHeight:"80vh", overflow:"auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:12 }}>
                <span style={{ fontSize:15, fontWeight:700, color:C.white }}>선수 누적기록</span>
                <button onClick={() => setMatchModal(null)} style={styles.btnSm(C.grayDark)}>닫기</button>
              </div>
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead><tr>{["선수","골","어시","자책","클린","실점"].map(h => <th key={h} style={styles.th}>{h}</th>)}</tr></thead>
                <tbody>
                  {attendees.map(p => { const st = playerMatchStats[p]; if (!st || (st.goals===0 && st.assists===0 && st.owngoals===0 && st.cleanSheets===0 && st.conceded===0)) return null; return (
                    <tr key={p}>
                      <td style={styles.td(true)}>{p}</td>
                      <td style={styles.td(st.goals>0)}>{st.goals}</td>
                      <td style={styles.td(st.assists>0)}>{st.assists}</td>
                      <td style={{ ...styles.td(st.owngoals>0), color:st.owngoals>0?C.red:C.white }}>{st.owngoals}</td>
                      <td style={styles.td(st.cleanSheets>0)}>{st.cleanSheets}</td>
                      <td style={styles.td()}>{st.conceded}</td>
                    </tr>
                  ); }).filter(Boolean)}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── 메인 영역 ── */}
        <div style={styles.section}>
          {matchMode==="schedule" && schedule.length > 0 && !isExtraRound ? (
            <ScheduleMatchView schedule={schedule} currentRoundIdx={currentRoundIdx}
              viewingRoundIdx={viewingRoundIdx} setViewingRoundIdx={setViewingRoundIdx}
              confirmedRounds={confirmedRounds} onConfirmRound={confirmRound}
              teams={teams} teamNames={teamNames} teamColorIndices={teamColorIndices} gks={gks}
              courtCount={courtCount} allEvents={allEvents} onRecordEvent={recordMatchEvent}
              onUndoEvent={undoMatchEvent} onDeleteEvent={deleteEvent} onEditEvent={editEvent}
              completedMatches={completedMatches}
              attendees={attendees} styles={styles} />
          ) : (
            <FreeMatchView teams={teams} teamNames={teamNames} teamColorIndices={teamColorIndices} gks={gks}
              courtCount={courtCount} allEvents={allEvents} onRecordEvent={recordMatchEvent}
              onUndoEvent={undoMatchEvent} onDeleteEvent={deleteEvent} onEditEvent={editEvent}
              onFinishMatch={finishMatch} completedMatches={completedMatches}
              attendees={attendees} styles={styles} isExtraRound={isExtraRound} />
          )}
        </div>

        {/* ── 하단 바: 라운드 종료 확정 (스케줄 모드) ── */}
        {matchMode==="schedule" && schedule.length > 0 && !isExtraRound && (
          <div style={styles.bottomBar}>
            {!viewRoundConfirmed && viewingRoundIdx <= currentRoundIdx && viewingRoundIdx < schedule.length ? (
              <button onClick={handleConfirmScheduleRound} style={{ ...styles.btn(C.accent, C.bg), flex:1 }}>
                라운드 {viewingRoundIdx+1} 종료 확정
              </button>
            ) : viewRoundConfirmed ? (
              <div style={{ flex:1, textAlign:"center", color:C.green, fontWeight:700, padding:10 }}>라운드 {viewingRoundIdx+1} 종료됨</div>
            ) : null}
          </div>
        )}
      </div>
    );
  }

  // ═══════════ PHASE: SUMMARY ═══════════
  if (phase === "summary") {
    const standings = finalStandings;
    const playerRows = attendees.map(p => ({ name:p, team:getPlayerTeamName(p), ...calcPlayerPoints(p) })).sort((a,b) => b.total-a.total);

    return (
      <div style={styles.app}>
        <div style={styles.header}>
          <div style={styles.title}>📊 최종 집계</div>
          <div style={styles.subtitle}>{new Date().toLocaleDateString("ko-KR")} · {completedMatches.length}경기</div>
        </div>
        <div style={styles.phaseIndicator}>
          {["참석자","팀편성","경기","집계"].map((l,i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <div style={styles.dot(i===3)}/><span style={{ fontSize:10, color:i===3?C.accent:C.grayDark }}>{l}</span>
            </div>
          ))}
        </div>
        <div style={styles.section}>
          <div style={styles.sectionTitle}>🏆 팀 순위</div>
          <div style={styles.card}>
            <table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead><tr>{["#","팀","경기","승","무","패","득","실","승점",""].map(h => <th key={h} style={styles.th}>{h}</th>)}</tr></thead>
              <tbody>
                {standings.map((t,i) => (
                  <tr key={t.name} style={{ background:i===0?`${C.green}11`:i===standings.length-1?`${C.red}11`:"transparent" }}>
                    <td style={styles.td()}>{i+1}</td><td style={styles.td(true)}>{t.name}</td>
                    <td style={styles.td()}>{t.games}</td><td style={styles.td()}>{t.wins}</td><td style={styles.td()}>{t.draws}</td><td style={styles.td()}>{t.losses}</td>
                    <td style={styles.td()}>{t.gf}</td><td style={styles.td()}>{t.ga}</td><td style={styles.td(true)}>{t.points}</td>
                    <td style={styles.td()}>{i===0?"🍀":i===standings.length-1?"🍠":""}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div style={styles.section}>
          <div style={styles.sectionTitle}>👤 선수별 기록</div>
          <div style={{ ...styles.card, overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:480 }}>
              <thead><tr>{["선수","팀","골","어시","역주행","클린","🍀","🍠","실점","GK","총점"].map(h => <th key={h} style={styles.th}>{h}</th>)}</tr></thead>
              <tbody>
                {playerRows.map(p => (
                  <tr key={p.name}>
                    <td style={styles.td(true)}>{p.name}</td><td style={styles.td()}>{p.team}</td>
                    <td style={styles.td(p.goals>0)}>{p.goals}</td><td style={styles.td(p.assists>0)}>{p.assists}</td>
                    <td style={{ ...styles.td(p.owngoals>0), color:p.owngoals>0?C.red:C.white }}>{p.owngoals}</td>
                    <td style={styles.td(p.cleanSheets>0)}>{p.cleanSheets}</td>
                    <td style={{ ...styles.td(p.crova>0), color:p.crova>0?C.green:C.white }}>{p.crova||""}</td>
                    <td style={{ ...styles.td(p.goguma<0), color:p.goguma<0?C.red:C.white }}>{p.goguma||""}</td>
                    <td style={styles.td()}>{p.conceded}</td><td style={styles.td()}>{p.keeperGames}</td>
                    <td style={{ ...styles.td(true), fontSize:14, fontWeight:800 }}>{p.total}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div style={styles.section}>
          <div style={styles.sectionTitle}>📋 경기 기록</div>
          {completedMatches.map((m,i) => {
            const evts = allEvents.filter(e => e.matchId===m.matchId);
            return (
              <div key={i} style={{ ...styles.card, background:m.isExtra?`${C.orange}11`:C.card }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ fontSize:11, color:C.gray }}>{m.matchId}{m.isExtra?" (임시)":""}</span>
                  {m.court && <span style={{ fontSize:10, color:C.gray }}>{m.court}</span>}
                </div>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:12, fontSize:16, fontWeight:700 }}>
                  <span style={{ color:m.homeScore>m.awayScore?C.green:C.white }}>{m.homeTeam}</span>
                  <span style={{ fontSize:24, fontWeight:900 }}>{m.homeScore} : {m.awayScore}</span>
                  <span style={{ color:m.awayScore>m.homeScore?C.green:C.white }}>{m.awayTeam}</span>
                </div>
                {evts.length > 0 && (
                  <div style={{ marginTop:6 }}>
                    {evts.map((e,ei) => (
                      <div key={ei} style={styles.eventLog}>
                        <span>{e.type==="goal"?"⚽":"🔴"}</span>
                        <span style={{ fontWeight:600 }}>{e.player}</span>
                        <span style={{ color:C.gray, fontSize:11 }}>({e.type==="goal"?"골":"자책골"})</span>
                        {e.assist && <span style={{ color:C.gray, fontSize:11 }}> ← {e.assist}<span style={{ opacity:0.7 }}>(어시)</span></span>}
                        {e.concedingGk && <span style={{ color:C.gray, fontSize:11 }}> / 실점: {e.concedingGk}{e.type==="owngoal"?" (2점)":""}</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={styles.bottomBar}>
          <button onClick={() => setPhase("match")} style={styles.btn(C.grayDark)}>경기로</button>
          <button onClick={() => {
            const d = new Date();
            if (confirm(`${d.getMonth()+1}월 ${d.getDate()}일 풋살기록을 확정하시겠습니까?\n\n확정 후에도 경기 화면에서 수정 가능합니다.`)) {
              alert("기록이 확정되었습니다.");
            }
          }} style={{ ...styles.btn(C.green), flex:1 }}>기록 확정</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
