// 대시보드 CSV 파싱 → 선수 배열
function parseCSV(text) {
  const lines = text.split('\n');
  const players = [];
  for (let i = 3; i < lines.length; i++) { // 헤더 3줄 스킵
    const line = lines[i];
    if (!line.trim()) continue;
    const fields = parseCSVLine(line);
    // A(0)=ppg, B(1)=rank, C(2)=백넘버, D(3)=이름, E(4)=게임수, N(13)=포인트
    const name = fields[3];
    if (!name) continue;
    const rank = parseInt(fields[1]) || 0;
    const backNum = fields[2] ? parseInt(fields[2]) || null : null;
    const games = parseInt(fields[4]) || 0;
    const point = parseInt(fields[13]) || 0;
    const ppg = parseFloat(fields[0]) || 0;
    players.push({ rank, name, backNum, games, point, ppg });
  }
  return players;
}

// CSV 한 줄 파싱 유틸
function parseCSVLine(line) {
  const fields = [];
  let inQuote = false, field = '';
  for (const ch of line) {
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { fields.push(field.trim()); field = ''; }
    else { field += ch; }
  }
  fields.push(field.trim());
  return fields;
}

// Google Sheet에서 선수 데이터 가져오기 (대시보드 탭)
async function fetchSheetData() {
  const resp = await fetch(SHEET_CONFIG.csvUrl(SHEET_CONFIG.dashboardGid));
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const players = parseCSV(text);
  if (players.length === 0) throw new Error("선수 데이터 없음");
  return { lastUpdated: new Date().toISOString().slice(0, 10), players, seasonCrova: {}, seasonGoguma: {} };
}

// Google Sheet에서 참석명단 가져오기 (참석명단 탭)
async function fetchAttendanceData() {
  const resp = await fetch(SHEET_CONFIG.csvUrl(SHEET_CONFIG.attendanceGid));
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  const lines = text.split('\n');
  const attendees = [];
  let teamCount = null;
  for (let i = 0; i < lines.length; i++) {
    const f = parseCSVLine(lines[i]);
    let name = f[4] || '';
    // 첫 행 헤더+데이터 합쳐짐 처리: "참석 명단 조재상" → "조재상"
    if (name.startsWith('참석 명단 ') || name.startsWith('참석명단 ')) {
      name = name.replace(/^참석\s*명단\s+/, '');
    }
    if (name && name !== '참석 명단' && name !== '참석명단') {
      attendees.push(name.trim());
    }
    // N개 팀: col F (idx 5)에 "N개 팀", col G (idx 6)에 숫자
    if (f[5] && f[5].includes('N개 팀')) {
      teamCount = parseInt(f[6]) || null;
    }
  }
  return { attendees, teamCount };
}

// ─── UTILITIES ───
function getPlayerPoint(name) {
  const p = SEASON_DATA.players.find(x => x.name === name);
  return p ? p.point : 0;
}
function getPlayerData(name) {
  return SEASON_DATA.players.find(x => x.name === name) || { name, point:0, games:0, backNum:null };
}
function teamPower(members) {
  return members.reduce((sum, p) => sum + getPlayerPoint(p), 0);
}
function snakeDraft(players, teamCount) {
  const sorted = [...players].sort((a,b) => getPlayerPoint(b) - getPlayerPoint(a));
  const teams = Array.from({ length: teamCount }, () => []);
  sorted.forEach((player, idx) => {
    const round = Math.floor(idx / teamCount);
    const pos = idx % teamCount;
    const teamIdx = round % 2 === 0 ? pos : teamCount - 1 - pos;
    teams[teamIdx].push(player);
  });
  return teams;
}

// ─── BRACKET GENERATION ───
function generateRoundRobin(teamIndices) {
  const n = teamIndices.length;
  if (n < 2) return [];
  const t = [...teamIndices];
  if (n % 2 !== 0) t.push(-1);
  const rounds = [];
  for (let r = 0; r < t.length - 1; r++) {
    const round = [];
    for (let i = 0; i < t.length / 2; i++) {
      const h = t[i], a = t[t.length - 1 - i];
      if (h !== -1 && a !== -1) round.push([h, a]);
    }
    rounds.push(round);
    const last = t.pop();
    t.splice(1, 0, last);
  }
  return rounds;
}
function generate4Team2Court() {
  const rr = generateRoundRobin([0,1,2,3]);
  const s = [];
  for (let rot = 0; rot < 4; rot++) rr.forEach(r => s.push({ matches: r }));
  return s;
}
function generate5Team2Court() {
  const rr = generateRoundRobin([0,1,2,3,4]);
  const s = [];
  for (let rot = 0; rot < 2; rot++) rr.forEach(r => s.push({ matches: r }));
  return s;
}
function generate6Team2Court() {
  const rrA = generateRoundRobin([0,1,2]);
  const rrB = generateRoundRobin([3,4,5]);
  const firstHalf = [];
  for (let rot = 0; rot < 2; rot++) {
    for (let i = 0; i < rrA.length; i++) {
      firstHalf.push({ matches: [...rrA[i], ...rrB[i]], phase:"first" });
    }
  }
  return { firstHalf, needsMidSplit: true };
}
function generate1Court(teamCount, rotations) {
  const rr = generateRoundRobin(Array.from({length:teamCount},(_,i)=>i));
  const s = [];
  for (let rot = 0; rot < rotations; rot++) rr.forEach(r => r.forEach(m => s.push({ matches:[m] })));
  return s;
}

// CourtRecorder — 선수터치 → 골/어시/자책 선택 + GK토글 + 용병추가
// ═══════════════════════════════════════════════════════════════
function CourtRecorder({ matchInfo, homePlayers: initHomePlayers, awayPlayers: initAwayPlayers, allEvents, onRecordEvent, onUndoEvent, onDeleteEvent, onEditEvent, onFinish, onMatchInfoUpdate, styles: s, courtLabel, attendees }) {
  const [selectedPlayer, setSelectedPlayer] = useState(null); // {player, isHome}
  const [actionMode, setActionMode] = useState(null); // null | "selectAssist" | "selectScorer"
  const [pendingGoalPlayer, setPendingGoalPlayer] = useState(null);
  const [pendingAssistPlayer, setPendingAssistPlayer] = useState(null);
  const [editingEvent, setEditingEvent] = useState(null); // 수정 중인 이벤트 index (allEvents 내)
  const [editField, setEditField] = useState(null); // "player" | "assist" | null
  // GK 토글 상태 (경기 중 변경 가능)
  const [homeGk, setHomeGk] = useState(matchInfo.homeGk || null);
  const [awayGk, setAwayGk] = useState(matchInfo.awayGk || null);
  // 용병 추가 상태
  const [mercs, setMercs] = useState([]); // [{player, side:"home"|"away"}]
  const [showMercPicker, setShowMercPicker] = useState(null); // "home"|"away"|null

  const { homeIdx, awayIdx, matchId, homeTeam, awayTeam, homeColor, awayColor } = matchInfo;

  // 실제 선수 목록 = 원본 + 용병
  const homeMercs = mercs.filter(m => m.side === "home").map(m => m.player);
  const awayMercs = mercs.filter(m => m.side === "away").map(m => m.player);
  const homePlayers = [...initHomePlayers, ...homeMercs];
  const awayPlayers = [...initAwayPlayers, ...awayMercs];

  // 용병 후보: 현재 경기에 없는 참석자
  const mercCandidates = (attendees || []).filter(p => !homePlayers.includes(p) && !awayPlayers.includes(p));

  const matchEvents = allEvents.filter(e => e.matchId === matchId);
  const homeScore = matchEvents.filter(e => e.scoringTeam === homeTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0);
  const awayScore = matchEvents.filter(e => e.scoringTeam === awayTeam).reduce((s, e) => s + (e.type === "owngoal" ? 2 : 1), 0);

  // 선수 터치 핸들러
  const handlePlayerTap = (player, isHome) => {
    if (!homeGk || !awayGk) { alert(`키퍼를 먼저 지정하세요: ${!homeGk?homeTeam:""}${!homeGk&&!awayGk?", ":""}${!awayGk?awayTeam:""}`); return; }
    // 어시스트 선수 선택 대기 중
    if (actionMode === "selectAssist" && pendingGoalPlayer) {
      if (player === pendingGoalPlayer.player) return; // 자기 자신 스킵
      const gp = pendingGoalPlayer;
      onRecordEvent(courtLabel, {
        type:"goal", matchId, player: gp.player, assist: player,
        team: gp.isHome ? homeTeam : awayTeam,
        scoringTeam: gp.isHome ? homeTeam : awayTeam,
        concedingTeam: gp.isHome ? awayTeam : homeTeam,
        concedingGk: gp.isHome ? awayGk : homeGk,
        concedingGkLoss: 1, homeTeam, awayTeam,
      });
      resetState();
      return;
    }
    // 득점자 선택 대기 중 (어시 먼저 선택한 경우)
    if (actionMode === "selectScorer" && pendingAssistPlayer) {
      if (player === pendingAssistPlayer.player) return;
      const ap = pendingAssistPlayer;
      const scorerIsHome = isHome;
      onRecordEvent(courtLabel, {
        type:"goal", matchId, player: player, assist: ap.player,
        team: scorerIsHome ? homeTeam : awayTeam,
        scoringTeam: scorerIsHome ? homeTeam : awayTeam,
        concedingTeam: scorerIsHome ? awayTeam : homeTeam,
        concedingGk: scorerIsHome ? awayGk : homeGk,
        concedingGkLoss: 1, homeTeam, awayTeam,
      });
      resetState();
      return;
    }
    // 기본: 선수 선택 → 액션 팝업
    setSelectedPlayer({ player, isHome });
    setActionMode(null);
  };

  const checkGk = () => {
    if (!homeGk || !awayGk) { alert(`키퍼를 먼저 지정하세요: ${!homeGk?homeTeam:""}${!homeGk&&!awayGk?", ":""}${!awayGk?awayTeam:""}`); return false; }
    return true;
  };

  // 골 선택
  const handleGoal = () => {
    if (!checkGk()) return;
    setPendingGoalPlayer(selectedPlayer);
    setActionMode("selectAssist");
    setSelectedPlayer(null);
  };

  // 어시스트 선택
  const handleAssist = () => {
    if (!checkGk()) return;
    setPendingAssistPlayer(selectedPlayer);
    setActionMode("selectScorer");
    setSelectedPlayer(null);
  };

  // 자책골 선택
  const handleOwnGoal = () => {
    if (!checkGk()) return;
    const sp = selectedPlayer;
    const ownTeam = sp.isHome ? homeTeam : awayTeam;
    const scoringTeam = sp.isHome ? awayTeam : homeTeam;
    const ownGk = sp.isHome ? homeGk : awayGk;
    onRecordEvent(courtLabel, {
      type:"owngoal", matchId, player: sp.player,
      team: ownTeam, scoringTeam, concedingTeam: ownTeam,
      concedingGk: ownGk, concedingGkLoss: 2,
      assist: null, homeTeam, awayTeam,
    });
    resetState();
  };

  // 어시스트 스킵 (골만 기록)
  const skipAssist = () => {
    if (!pendingGoalPlayer) return;
    const gp = pendingGoalPlayer;
    onRecordEvent(courtLabel, {
      type:"goal", matchId, player: gp.player, assist: null,
      team: gp.isHome ? homeTeam : awayTeam,
      scoringTeam: gp.isHome ? homeTeam : awayTeam,
      concedingTeam: gp.isHome ? awayTeam : homeTeam,
      concedingGk: gp.isHome ? awayGk : homeGk,
      concedingGkLoss: 1, homeTeam, awayTeam,
    });
    resetState();
  };

  const resetState = () => {
    setSelectedPlayer(null);
    setActionMode(null);
    setPendingGoalPlayer(null);
    setPendingAssistPlayer(null);
  };

  const handleUndo = () => {
    onUndoEvent(courtLabel, matchId);
    resetState();
  };

  const handleFinish = () => {
    if (!homeGk || !awayGk) { alert(`키퍼를 지정하세요: ${!homeGk?homeTeam:""}${!homeGk&&!awayGk?", ":""}${!awayGk?awayTeam:""}`); return; }
    const msg = `${courtLabel ? courtLabel + "\n" : ""}${homeTeam} ${homeScore} : ${awayScore} ${awayTeam}\n\n경기결과를 확정하시겠습니까?`;
    if (!confirm(msg)) return;
    onFinish({ matchId, homeIdx, awayIdx, homeTeam, awayTeam, homeGk, awayGk, homeScore, awayScore, court: courtLabel, mercenaries: mercs });
    resetState();
  };

  // GK 토글
  const toggleGk = (player, isHome) => {
    if (isHome) setHomeGk(prev => prev === player ? null : player);
    else setAwayGk(prev => prev === player ? null : player);
  };

  // 용병 추가
  const addMerc = (player, side) => {
    setMercs(prev => [...prev, { player, side }]);
    setShowMercPicker(null);
  };

  // 용병 제거
  const removeMerc = (player) => {
    setMercs(prev => prev.filter(m => m.player !== player));
  };

  // 하이라이트 스타일 (선수 선택 상태에 따라)
  const getPlayerStyle = (player, isHome) => {
    const color = isHome ? homeColor : awayColor;
    let extra = {};
    // 어시스트 선택 중: 같은 팀만 선택 가능 강조
    if (actionMode === "selectAssist" && pendingGoalPlayer) {
      if (player === pendingGoalPlayer.player) extra = { opacity: 0.3 };
      else if (isHome === pendingGoalPlayer.isHome) extra = { boxShadow: `0 0 0 2px ${C.accent}`, transform: "scale(1.02)" };
      else extra = { opacity: 0.3 };
    }
    // 득점자 선택 중: 어시스트와 같은 팀만
    if (actionMode === "selectScorer" && pendingAssistPlayer) {
      if (player === pendingAssistPlayer.player) extra = { opacity: 0.3 };
      else if (isHome === pendingAssistPlayer.isHome) extra = { boxShadow: `0 0 0 2px ${C.green}`, transform: "scale(1.02)" };
      else extra = { opacity: 0.3 };
    }
    return { ...s.matchBtn(color), width:"100%", marginBottom:4, transition:"all 0.15s", ...extra };
  };

  return (
    <div style={{ ...s.card, border:`1px solid ${C.grayDark}` }}>
      {courtLabel && <div style={{ fontSize:11, color:C.gray, marginBottom:6, textAlign:"center" }}>{courtLabel}</div>}

      {/* 스코어보드 */}
      <div style={s.scoreboard}>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:12, fontWeight:700, color:homeColor?.bg, marginBottom:4 }}>{homeTeam}</div>
          <div style={{ color: homeScore > awayScore ? C.green : C.white }}>{homeScore}</div>
        </div>
        <div style={{ fontSize:18, color:C.gray }}>:</div>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:12, fontWeight:700, color:awayColor?.bg, marginBottom:4 }}>{awayTeam}</div>
          <div style={{ color: awayScore > homeScore ? C.green : C.white }}>{awayScore}</div>
        </div>
      </div>

      {/* 상태 안내 메시지 */}
      {actionMode === "selectAssist" && (
        <div style={{ textAlign:"center", padding:8, background:`${C.accent}22`, borderRadius:8, marginBottom:8, fontSize:13, fontWeight:600, color:C.white }}>
          <div>⚽ <b>{pendingGoalPlayer?.player}</b> 골! 어시스트 선수를 터치하세요</div>
          <button onClick={skipAssist} style={{ ...s.btnSm(C.grayDark), marginTop:6 }}>어시 없음 (스킵)</button>
        </div>
      )}
      {actionMode === "selectScorer" && (
        <div style={{ textAlign:"center", padding:8, background:`${C.green}22`, borderRadius:8, marginBottom:8, fontSize:13, fontWeight:600, color:C.white }}>
          <div>👟 <b>{pendingAssistPlayer?.player}</b> 어시스트! 골 넣은 선수를 터치하세요</div>
        </div>
      )}

      {/* 선수 액션 모달 */}
      {selectedPlayer && !actionMode && (
        <div onClick={resetState} style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:C.card, borderRadius:14, padding:20, minWidth:260, maxWidth:"80vw", textAlign:"center" }}>
            <div style={{ fontSize:17, fontWeight:700, marginBottom:14, color:C.white }}>{selectedPlayer.player}</div>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button onClick={handleGoal} style={{ ...s.btn(C.green), flex:1, padding:"12px 0", fontSize:15 }}>⚽ 골</button>
              <button onClick={handleAssist} style={{ ...s.btn(C.accent, C.bg), flex:1, padding:"12px 0", fontSize:15 }}>👟 어시</button>
              <button onClick={handleOwnGoal} style={{ ...s.btn(C.red), flex:1, padding:"12px 0", fontSize:15 }}>🔴 자책골</button>
            </div>
            <button onClick={resetState} style={{ ...s.btnSm(C.grayDark), marginTop:10, width:"100%" }}>취소</button>
          </div>
        </div>
      )}

      {/* 선수 버튼 */}
      <div style={{ display:"flex", gap:8 }}>
        {/* 홈팀 */}
        <div style={{ flex:1 }}>
          <div style={{ fontSize:10, color:C.gray, textAlign:"center", marginBottom:4 }}>{homeTeam}</div>
          {homePlayers.map(p => {
            const isMerc = homeMercs.includes(p);
            return (
              <div key={p} style={{ display:"flex", gap:3, marginBottom:4, alignItems:"stretch" }}>
                <button onClick={() => handlePlayerTap(p, true)} style={{ ...getPlayerStyle(p, true), flex:1, marginBottom:0 }}>
                  {homeGk === p && <span style={{ marginRight:4, fontSize:10 }}>🧤</span>}
                  {isMerc && <span style={{ marginRight:2, fontSize:9, color:C.orange }}>(용병)</span>}
                  {p}
                </button>
                <button onClick={() => toggleGk(p, true)}
                  style={{ ...s.btnSm(homeGk === p ? C.yellow : C.grayDarker, homeGk === p ? "#000" : C.gray), padding:"4px 6px", fontSize:9, minWidth:28 }}>
                  GK
                </button>
                {isMerc && (
                  <button onClick={() => removeMerc(p)}
                    style={{ ...s.btnSm(C.redDim), padding:"4px 6px", fontSize:9, minWidth:24 }}>X</button>
                )}
              </div>
            );
          })}
          <button onClick={() => setShowMercPicker("home")}
            style={{ ...s.btnSm(C.grayDark, C.orange), width:"100%", marginTop:4, fontSize:11 }}>
            + 선수추가
          </button>
        </div>
        {/* 원정팀 */}
        <div style={{ flex:1 }}>
          <div style={{ fontSize:10, color:C.gray, textAlign:"center", marginBottom:4 }}>{awayTeam}</div>
          {awayPlayers.map(p => {
            const isMerc = awayMercs.includes(p);
            return (
              <div key={p} style={{ display:"flex", gap:3, marginBottom:4, alignItems:"stretch" }}>
                <button onClick={() => handlePlayerTap(p, false)} style={{ ...getPlayerStyle(p, false), flex:1, marginBottom:0 }}>
                  {awayGk === p && <span style={{ marginRight:4, fontSize:10 }}>🧤</span>}
                  {isMerc && <span style={{ marginRight:2, fontSize:9, color:C.orange }}>(용병)</span>}
                  {p}
                </button>
                <button onClick={() => toggleGk(p, false)}
                  style={{ ...s.btnSm(awayGk === p ? C.yellow : C.grayDarker, awayGk === p ? "#000" : C.gray), padding:"4px 6px", fontSize:9, minWidth:28 }}>
                  GK
                </button>
                {isMerc && (
                  <button onClick={() => removeMerc(p)}
                    style={{ ...s.btnSm(C.redDim), padding:"4px 6px", fontSize:9, minWidth:24 }}>X</button>
                )}
              </div>
            );
          })}
          <button onClick={() => setShowMercPicker("away")}
            style={{ ...s.btnSm(C.grayDark, C.orange), width:"100%", marginTop:4, fontSize:11 }}>
            + 선수추가
          </button>
        </div>
      </div>

      {/* 용병 선택 모달 */}
      {showMercPicker && (
        <div style={{ background:C.cardLight, borderRadius:10, padding:12, marginTop:8 }}>
          <div style={{ fontSize:13, fontWeight:600, marginBottom:8, color:C.orange }}>
            {showMercPicker === "home" ? homeTeam : awayTeam}에 선수 추가
          </div>
          {mercCandidates.length === 0 ? (
            <div style={{ fontSize:12, color:C.gray }}>추가 가능한 선수가 없습니다.</div>
          ) : (
            <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
              {mercCandidates.map(p => (
                <button key={p} onClick={() => addMerc(p, showMercPicker)}
                  style={{ ...s.btnSm(C.grayDarker, C.white), padding:"6px 10px" }}>
                  {p}
                </button>
              ))}
            </div>
          )}
          <button onClick={() => setShowMercPicker(null)} style={{ ...s.btnSm(C.grayDark), marginTop:8 }}>닫기</button>
        </div>
      )}

      {/* 하단 여백 (경기종료 버튼은 라운드 레벨로 이동) */}

      {/* 이벤트 로그 — 상세 표시 + 수정/삭제 */}
      {matchEvents.length > 0 && (
        <div style={{ marginTop:10 }}>
          <div style={{ fontSize:12, fontWeight:700, color:C.gray, marginBottom:6 }}>경기 기록 ({matchEvents.length}건)</div>
          {matchEvents.map((e, localIdx) => {
            // allEvents에서의 실제 인덱스 찾기
            const globalIdx = allEvents.findIndex(ae => ae === e);
            const isEditing = editingEvent === globalIdx;

            return (
              <div key={localIdx} style={{ ...s.eventLog, flexDirection:"column", alignItems:"stretch", padding:isEditing ? 10 : "6px 10px", background: isEditing ? C.card : C.cardLight, border: isEditing ? `1px solid ${C.accent}` : "none" }}>
                {/* 기본 표시 */}
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:14 }}>{e.type === "goal" ? "⚽" : "🔴"}</span>
                  <div style={{ flex:1 }}>
                    <span style={{ fontWeight:600 }}>{e.player}</span>
                    <span style={{ color:C.gray, fontSize:11 }}>({e.type==="goal"?"골":"자책골"})</span>
                    {e.type === "goal" && e.assist && (
                      <span style={{ color:C.gray, fontSize:11 }}> ← {e.assist}<span style={{ opacity:0.7 }}>(어시)</span></span>
                    )}
                    {e.type === "goal" && !e.assist && (
                      <span style={{ color:C.grayDark, fontSize:11 }}> (어시 없음)</span>
                    )}
                    {e.concedingGk && (
                      <span style={{ color:C.gray, fontSize:11 }}> / 실점: {e.concedingGk}{e.type==="owngoal"?" (2점)":""}</span>
                    )}
                  </div>
                  <span style={{ color: e.scoringTeam === homeTeam ? homeColor?.bg : awayColor?.bg, fontSize:11, fontWeight:600 }}>{e.scoringTeam}</span>
                  {/* 수정/삭제 버튼 */}
                  <button onClick={() => setEditingEvent(isEditing ? null : globalIdx)}
                    style={{ ...s.btnSm(isEditing ? C.accent : C.grayDarker, isEditing ? C.bg : C.gray), padding:"3px 8px", fontSize:10 }}>
                    {isEditing ? "닫기" : "수정"}
                  </button>
                </div>

                {/* 수정 모드 */}
                {isEditing && (
                  <div style={{ marginTop:8, paddingTop:8, borderTop:`1px solid ${C.grayDarker}` }}>
                    {/* 골 선수 변경 */}
                    <div style={{ marginBottom:6 }}>
                      <div style={{ fontSize:11, color:C.gray, marginBottom:4 }}>
                        {e.type === "goal" ? "골 선수" : "자책골 선수"} 변경
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
                        {[...homePlayers, ...awayPlayers].map(p => (
                          <button key={p} onClick={() => {
                            const isHome = homePlayers.includes(p);
                            const updated = { ...e, player: p };
                            if (e.type === "owngoal") {
                              updated.team = isHome ? homeTeam : awayTeam;
                              updated.scoringTeam = isHome ? awayTeam : homeTeam;
                              updated.concedingTeam = isHome ? homeTeam : awayTeam;
                              updated.concedingGk = isHome ? homeGk : awayGk;
                            } else {
                              updated.team = isHome ? homeTeam : awayTeam;
                              updated.scoringTeam = isHome ? homeTeam : awayTeam;
                              updated.concedingTeam = isHome ? awayTeam : homeTeam;
                              updated.concedingGk = isHome ? awayGk : homeGk;
                            }
                            onEditEvent(globalIdx, updated);
                          }}
                            style={{ ...s.btnSm(e.player === p ? C.green : C.grayDarker, e.player === p ? "#fff" : C.gray), padding:"4px 8px", fontSize:11 }}>
                            {p}
                          </button>
                        ))}
                      </div>
                    </div>

                    {/* 어시스트 변경 (골일 때만) */}
                    {e.type === "goal" && (
                      <div style={{ marginBottom:6 }}>
                        <div style={{ fontSize:11, color:C.gray, marginBottom:4 }}>어시스트 변경</div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
                          <button onClick={() => {
                            onEditEvent(globalIdx, { ...e, assist: null });
                          }}
                            style={{ ...s.btnSm(!e.assist ? C.accent : C.grayDarker, !e.assist ? C.bg : C.gray), padding:"4px 8px", fontSize:11 }}>
                            없음
                          </button>
                          {[...homePlayers, ...awayPlayers].filter(p => p !== e.player).map(p => (
                            <button key={p} onClick={() => {
                              onEditEvent(globalIdx, { ...e, assist: p });
                            }}
                              style={{ ...s.btnSm(e.assist === p ? C.green : C.grayDarker, e.assist === p ? "#fff" : C.gray), padding:"4px 8px", fontSize:11 }}>
                              {p}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* 삭제 */}
                    <button onClick={() => { onDeleteEvent(globalIdx); setEditingEvent(null); }}
                      style={{ ...s.btnSm(C.red), width:"100%", marginTop:4 }}>
                      이 기록 삭제
                    </button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
